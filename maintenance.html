<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Under Maintenance · Elaborate</title>
<link rel="icon" type="image/png" href="/favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;0,900;1,300&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B2A;--coral:#FF5733;--gold:#F4C542;--sage:#7DBE8E;--cream:#F5F0E8;--muted:rgba(13,27,42,.5)}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;position:relative;overflow:hidden}
/* Background orbs */
.orb{position:absolute;border-radius:50%;pointer-events:none}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(255,87,51,.12) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%)}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(244,197,66,.08) 0%,transparent 70%);bottom:-100px;right:-100px}
/* Animated gear */
.gear-wrap{position:relative;width:96px;height:96px;margin:0 auto 32px}
.gear{width:96px;height:96px;color:var(--coral);animation:spin 8s linear infinite}
.gear-inner{position:absolute;inset:24px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
@keyframes spin{to{transform:rotate(360deg)}}
/* Pulse dot */
.pulse-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.pulse-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
/* Text */
h1{font-family:'Fraunces',serif;font-size:clamp(2.2rem,5vw,4rem);font-weight:900;letter-spacing:-.03em;line-height:1.05;margin-bottom:14px}
h1 em{font-style:italic;font-weight:300;color:var(--coral)}
.sub{font-size:1rem;color:rgba(255,255,255,.5);max-width:460px;line-height:1.72;margin:0 auto 32px}
/* Page name pill */
.page-pill{display:inline-flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:.68rem;padding:5px 14px;border-radius:50px;background:rgba(255,87,51,.12);border:1.5px solid rgba(255,87,51,.25);color:var(--coral);letter-spacing:.06em;text-transform:uppercase;margin-bottom:28px}
/* Message card */
.msg-card{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:20px 24px;max-width:420px;margin:0 auto 32px;font-size:.88rem;color:rgba(255,255,255,.65);line-height:1.65;display:none}
.msg-card.show{display:block}
/* Links */
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:11px 24px;border-radius:50px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.86rem;text-decoration:none;transition:all .2s;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--coral);color:#fff}
.btn-primary:hover{background:#e84520;transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.15)}
.btn-ghost:hover{background:rgba(255,255,255,.12);color:#fff}
/* ETA */
.eta{margin-top:28px;font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.25);letter-spacing:.06em}
/* Footer */
footer{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-family:'DM Mono',monospace;font-size:.6rem;color:rgba(255,255,255,.2);letter-spacing:.06em}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="gear-wrap">
  <svg class="gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
    <path d="M19.622 10.395l-1.097-2.65L20 6l-2-2-1.735 1.483-2.707-1.113L12.935 2h-1.954l-.623 2.370-2.707 1.113L6 4 4 6l1.453 1.789-1.085 2.616L2 11v2l2.368.595 1.085 2.616L4 18l2 2 1.793-1.475 2.707 1.113.623 2.362h1.954l.623-2.362 2.707-1.113L18 20l2-2-1.453-1.789 1.085-2.616L22 13v-2l-2.378-.605Z"/>
  </svg>
  <div class="gear-inner">🔧</div>
</div>

<div class="pulse-row">
  <div class="pulse-dot"></div>
  <span class="pulse-label">Maintenance in progress</span>
</div>

<div class="page-pill" id="pagePill" style="display:none">
  <span>📄</span><span id="pageName">This page</span>
</div>

<h1>Back <em>shortly.</em></h1>
<p class="sub">This part of Elaborate is temporarily offline for maintenance. Our team is working on it and it will be back up soon.</p>

<div class="msg-card" id="msgCard">
  <div id="msgText"></div>
</div>

<div class="links">
  <a class="btn btn-primary" href="/index.html">← Go to Hub</a>
  <a class="btn btn-ghost" href="/status.html">View Status Page</a>
</div>

<div class="eta" id="etaText"></div>

<footer>elaborate. · system maintenance · <span id="footerTime"></span></footer>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({apiKey:"AIzaSyA4f0NpoH1LLmbejrNmOgIxbD__MIUZkGs",authDomain:"elaborate-edc16.firebaseapp.com",projectId:"elaborate-edc16"});
const db  = getFirestore(app);

// Which page sent us here?
const params = new URLSearchParams(window.location.search);
const fromPage = params.get('page') || '';
const pageLabels = {
  index:'Student Hub', hub:'Student Hub', profile:'Profile', classroom:'Classroom',
  support:'Support', docs:'Documentation', developers:'Developer Portal',
  careers:'Careers', about:'About', status:'Status Page', districts:'Districts',
  donate:'Donate', legal:'Legal', 'my-tickets':'My Tickets',
};
const label = pageLabels[fromPage] || fromPage || '';
if (label) {
  document.getElementById('pagePill').style.display = 'inline-flex';
  document.getElementById('pageName').textContent = label;
}

// Load maintenance message if set
try {
  const snap = await getDoc(doc(db,'siteConfig','maintenance'));
  if (snap.exists()) {
    const data = snap.data();
    const key = fromPage || 'global';
    const msg = data[key]?.message || data.global?.message || '';
    const eta = data[key]?.eta || data.global?.eta || '';
    if (msg) {
      document.getElementById('msgText').textContent = msg;
      document.getElementById('msgCard').classList.add('show');
    }
    if (eta) {
      document.getElementById('etaText').textContent = 'Estimated completion: ' + eta;
    }
    // If page is no longer under maintenance, redirect back
    const isDown = data[key]?.enabled || data.global?.enabled;
    if (!isDown && fromPage) {
      window.location.href = '/' + fromPage + '.html';
    }
  }
} catch(e) { /* offline — just show the static maintenance page */ }

document.getElementById('footerTime').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
</script>
</body>
</html>
