<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Account Disabled — Elaborate</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:#F5F0E8; --navy:#0D1B2A; --coral:#FF5733; --gold:#F4C542;
    --lavender:#A78BFA; --card-bg:#FFFFFF; --text:#1A1A2E; --muted:#6B7280;
    --shadow:0 4px 24px rgba(13,27,42,.10);
    --tr:.25s cubic-bezier(.4,0,.2,1);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--cream);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }

  .blob {
    position:absolute; border-radius:50%;
    filter:blur(90px); opacity:.25;
    pointer-events:none;
    animation:drift 14s ease-in-out infinite alternate;
  }
  .blob-1 { width:500px; height:500px; background:var(--coral); top:-160px; left:-120px; animation-delay:0s; }
  .blob-2 { width:380px; height:380px; background:var(--gold);  bottom:-100px; right:-80px; animation-delay:-5s; }
  .blob-3 { width:260px; height:260px; background:var(--lavender); top:50%; left:55%; animation-delay:-9s; }
  @keyframes drift { from{transform:translate(0,0)scale(1)} to{transform:translate(24px,18px)scale(1.07)} }

  .card {
    position:relative; z-index:1;
    background:var(--card-bg);
    border-radius:28px;
    padding:52px 48px 44px;
    max-width:480px; width:100%;
    box-shadow:0 24px 80px rgba(13,27,42,.13);
    border:1.5px solid rgba(13,27,42,.06);
    text-align:center;
    animation:fadeUp .6s both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }

  .logo {
    font-family:'Fraunces',serif;
    font-weight:900; font-size:1.5rem;
    color:var(--navy); letter-spacing:-.02em;
    margin-bottom:36px;
    display:inline-block;
  }
  .logo span { color:var(--coral); }

  .icon-wrap {
    width:72px; height:72px; border-radius:50%;
    background:rgba(255,87,51,.1);
    border:2px solid rgba(255,87,51,.2);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 24px;
    font-size:2rem;
  }

  h1 {
    font-family:'Fraunces',serif;
    font-size:1.85rem; font-weight:900;
    color:var(--navy); letter-spacing:-.02em;
    margin-bottom:12px;
    line-height:1.15;
  }
  h1 em { font-style:italic; font-weight:300; color:var(--coral); }

  .message {
    font-size:.95rem; color:var(--muted);
    line-height:1.7; margin-bottom:28px;
  }

  .divider {
    height:1px; background:rgba(13,27,42,.08);
    margin:0 0 24px;
  }

  .reason-box {
    background:rgba(255,87,51,.06);
    border:1.5px solid rgba(255,87,51,.18);
    border-radius:14px;
    padding:16px 20px;
    margin-bottom:28px;
    text-align:left;
  }
  .reason-label {
    font-size:.72rem; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase;
    color:var(--coral); margin-bottom:6px;
  }
  .reason-text {
    font-size:.9rem; color:var(--text);
    font-weight:500; line-height:1.6;
  }

  .contact-btn {
    display:inline-flex; align-items:center; gap:8px;
    font-family:'DM Sans',sans-serif;
    font-size:.95rem; font-weight:600;
    padding:14px 32px; border-radius:50px;
    border:none; cursor:pointer;
    background:var(--navy); color:#fff;
    text-decoration:none;
    transition:all var(--tr);
    box-shadow:0 4px 20px rgba(13,27,42,.2);
  }
  .contact-btn:hover { background:var(--coral); transform:translateY(-2px); box-shadow:0 8px 28px rgba(255,87,51,.3); }

  .footer-note {
    margin-top:28px;
    font-size:.78rem; color:var(--muted);
  }
  .footer-note a { color:var(--coral); text-decoration:none; font-weight:600; }
  .footer-note a:hover { text-decoration:underline; }
</style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <div class="logo">Elaborate<span>.</span></div>

    <div class="icon-wrap">🔒</div>

    <h1>Your account has<br/>been <em>disabled</em></h1>

    <p class="message">
      Access to your Elaborate hub has been suspended by an administrator.
      You are currently unable to log in or access your apps.
    </p>

    <div class="divider"></div>

    <!-- Shown only if ?reason= is present in the URL -->
    <div class="reason-box" id="reasonBox" style="display:none">
      <div class="reason-label">Reason for suspension</div>
      <div class="reason-text" id="reasonText"></div>
    </div>

    <a class="contact-btn" href="https://forms.gle/wXyfoPrhaps8YcNM8" target="_blank">
      ✉ Contact Support
    </a>

    <p class="footer-note">
      If you're a school admin, manage accounts at
      <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a>.
    </p>
  </div>

  <script type="module">
    import { initializeApp }                        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, getDoc }            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:"AIzaSyA4f0NpoH1LLmbejrNmOgIxbD__MIUZkGs",
      authDomain:"elaborate-edc16.firebaseapp.com",
      projectId:"elaborate-edc16",
      storageBucket:"elaborate-edc16.firebasestorage.app",
      messagingSenderId:"923385978777",
      appId:"1:923385978777:web:7d0fdb0472e14e8500bd08"
    };
    const fbApp = initializeApp(firebaseConfig);
    const auth  = getAuth(fbApp);
    const db    = getFirestore(fbApp);

    function showReason(reason) {
      if (reason && reason.trim()) {
        document.getElementById('reasonText').textContent = reason.trim();
        document.getElementById('reasonBox').style.display = 'block';
      }
    }

    // Check URL param first (immediate display, no auth needed)
    const urlReason = new URLSearchParams(window.location.search).get('reason');
    if (urlReason) showReason(urlReason);

    // Then load Firestore reason for logged-in user
    onAuthStateChanged(auth, async user => {
      if (user) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists() && snap.data().suspensionReason) {
            showReason(snap.data().suspensionReason);
          }
        } catch(e) { console.error('Could not load suspension reason', e); }
        // Sign them out after reading so they cannot navigate back
        await signOut(auth);
      }
    });
  </script>

</body>
</html>
