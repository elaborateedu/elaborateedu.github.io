<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/png" href="/favicon.png">
<title>404 — Elaborate</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --cream:#F5F0E8; --navy:#0D1B2A; --coral:#FF5733; --gold:#F4C542;
  --sage:#7DBE8E; --lavender:#A78BFA; --sky:#38BDF8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--navy);
  color:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* ── BACKGROUND NOISE ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
  background-size:180px;pointer-events:none;z-index:0;
}

/* ── FLOATING NUMBERS ── */
.float-num{
  position:fixed;font-family:'Fraunces',serif;font-weight:900;
  color:rgba(255,255,255,.03);pointer-events:none;z-index:0;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  from{transform:translateY(110vh) rotate(-8deg)}
  to{transform:translateY(-20vh) rotate(8deg)}
}

/* ── MAIN CONTENT ── */
.page{position:relative;z-index:1;width:100%;max-width:860px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:0}

/* The big 404 */
.hero-num{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(5rem,18vw,11rem);
  line-height:.85;letter-spacing:-.05em;
  background:linear-gradient(135deg,var(--coral) 0%,var(--gold) 40%,var(--lavender) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:heroIn .7s cubic-bezier(.22,1,.36,1) both;
  position:relative;
}
.hero-num::after{
  content:'404';
  position:absolute;inset:0;
  font-family:'Fraunces',serif;font-weight:900;
  font-size:inherit;letter-spacing:inherit;line-height:inherit;
  -webkit-text-fill-color:transparent;
  -webkit-text-stroke:1.5px rgba(255,255,255,.06);
  transform:translate(3px,4px);
  z-index:-1;
}
@keyframes heroIn{
  from{opacity:0;transform:scale(.7) translateY(30px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.headline{
  font-family:'Fraunces',serif;font-size:clamp(1.3rem,3vw,2rem);
  font-weight:700;margin-top:12px;text-align:center;
  color:#fff;letter-spacing:-.02em;
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .15s both;
}
.headline em{color:var(--coral);font-style:italic;font-weight:300}

.sub{
  font-size:.9rem;color:rgba(255,255,255,.45);margin-top:8px;
  text-align:center;max-width:420px;line-height:1.7;
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .22s both;
}

/* ── GAME CONTAINER ── */
.game-wrap{
  margin-top:20px;
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .3s both;
  position:relative;
}
.game-label{
  font-family:'DM Mono',monospace;font-size:.62rem;
  letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.25);text-align:center;
  margin-bottom:8px;
}
#gameCanvas{
  display:block;border-radius:16px;
  background:#0a1520;
  border:1.5px solid rgba(255,255,255,.08);
  box-shadow:0 16px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
  cursor:pointer;
}
.game-hint{
  font-size:.72rem;color:rgba(255,255,255,.22);
  text-align:center;margin-top:8px;
  font-family:'DM Mono',monospace;letter-spacing:.06em;
}

/* ── BUTTONS ── */
.btn-row{
  display:flex;gap:10px;margin-top:18px;
  animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .4s both;
}
.btn{
  font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;
  padding:11px 24px;border-radius:50px;border:none;cursor:pointer;
  transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--coral);color:#fff}
.btn-primary:hover{background:#e8401e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,87,51,.4)}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.1)}
.btn-ghost:hover{background:rgba(255,255,255,.13);color:#fff;transform:translateY(-2px)}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── HIGH SCORE ── */
.hs-badge{
  position:absolute;top:-10px;right:-10px;
  background:linear-gradient(135deg,var(--gold),#e8a800);
  color:var(--navy);font-family:'DM Mono',monospace;
  font-size:.6rem;font-weight:700;letter-spacing:.06em;
  padding:4px 10px;border-radius:50px;text-transform:uppercase;
  box-shadow:0 4px 12px rgba(244,197,66,.5);
  animation:badgePop .4s cubic-bezier(.34,1.56,.64,1) both;
  display:none;
}
@keyframes badgePop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<!-- Floating 404 numbers in background -->
<script>
for(let i=0;i<8;i++){
  const el=document.createElement('div');
  el.className='float-num';
  el.textContent='404';
  el.style.cssText=`left:${Math.random()*100}%;font-size:${6+Math.random()*12}rem;animation-duration:${14+Math.random()*18}s;animation-delay:-${Math.random()*20}s`;
  document.body.appendChild(el);
}
</script>

<div class="page">
  <div class="hero-num">404</div>

  <h1 class="headline">You wandered off the <em>syllabus</em></h1>
  <p class="sub">This page doesn't exist. Or it did exist, but a teacher confiscated it. Either way — it's gone.</p>

  <div class="game-wrap">
    <div class="game-label">While you're here — fly around</div>
    <canvas id="gameCanvas" width="620" height="160"></canvas>
    <div id="hsBadge" class="hs-badge">🏆 new best!</div>
    <div class="game-hint" id="gameHint">SPACE / TAP to start · ↑↓ or drag to steer</div>
  </div>

  <div class="btn-row">
    <a href="/" class="btn btn-primary">← Back to Home</a>
    <a href="/index.html#hub" class="btn btn-ghost">Open My Hub</a>
  </div>
</div>

<script>
/* Paper Pilot — 404 mini-game
   Steer a paper airplane up & down.
   Dodge bad grades (D, F). Collect gold A's.
   Arrow keys / WASD / touch drag / mouse drag.
*/

(function() {

var canvas = document.getElementById('gameCanvas');
var ctx    = canvas.getContext('2d');
var W = 620, H = 160;

// Scale canvas display size responsively
function resize() {
  var maxW = Math.min(window.innerWidth - 32, 620);
  canvas.style.width  = maxW + 'px';
  canvas.style.height = Math.round(maxW * H / W) + 'px';
}
resize();
window.addEventListener('resize', resize);

// State
var IDLE = 0, PLAYING = 1, DEAD = 2;
var state = IDLE;
var score = 0;
var hiScore = 0;
try { hiScore = +localStorage.getItem('pilotHi') || 0; } catch(e){}
var frame = 0, spd = 2.8;
var particles = [], objects = [], trail = [];
var nextSpawn = 60;

// Plane
var plane = { y: H/2, vy: 0, tilt: 0 };
var PX = 80, PW = 26, PH = 13;

// Input
var upHeld = false, dnHeld = false;
var touchStartY = null, touchCurY = null;
var mouseDown = false, mouseY = null;

document.addEventListener('keydown', function(e) {
  if (e.code === 'ArrowUp'   || e.code === 'KeyW') { e.preventDefault(); upHeld = true; }
  if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); dnHeld = true; }
  if (e.code === 'Space' && state !== PLAYING)     { e.preventDefault(); startGame(); }
});
document.addEventListener('keyup', function(e) {
  if (e.code === 'ArrowUp'   || e.code === 'KeyW') upHeld = false;
  if (e.code === 'ArrowDown' || e.code === 'KeyS') dnHeld = false;
});

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  touchStartY = e.touches[0].clientY;
  touchCurY   = touchStartY;
  if (state !== PLAYING) startGame();
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  touchCurY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', function() {
  touchStartY = null; touchCurY = null;
}, { passive: true });

canvas.addEventListener('mousedown', function(e) {
  mouseDown = true;
  mouseY = e.clientY;
  if (state !== PLAYING) startGame();
});
window.addEventListener('mousemove', function(e) { if (mouseDown) mouseY = e.clientY; });
window.addEventListener('mouseup',   function()  { mouseDown = false; mouseY = null; });

function getDir() {
  if (upHeld) return -1;
  if (dnHeld) return  1;
  if (touchStartY !== null && touchCurY !== null) {
    var dy = touchCurY - touchStartY;
    if (Math.abs(dy) > 8) return dy > 0 ? 1 : -1;
  }
  if (mouseDown && mouseY !== null) {
    var rect = canvas.getBoundingClientRect();
    var scale = H / rect.height;
    var relY = (mouseY - rect.top) * scale;
    return relY < plane.y ? -1 : 1;
  }
  return 0;
}

function startGame() {
  state = PLAYING;
  score = 0; frame = 0; spd = 2.8;
  objects = []; particles = []; trail = [];
  plane.y = H / 2; plane.vy = 0; plane.tilt = 0;
  nextSpawn = 55;
}

function spawn() {
  var bad = Math.random() < 0.62;
  objects.push({
    letter: bad ? (Math.random() < 0.5 ? 'F' : 'D') : 'A',
    x: W + 20,
    y: 16 + Math.random() * (H - 32),
    bad: bad,
    sz: bad ? 17 : 14,
    rot: (Math.random() - 0.5) * 0.5,
    vrot: (Math.random() - 0.5) * 0.022,
    bob: Math.random() * Math.PI * 2,
    bobSpd: 0.04 + Math.random() * 0.03,
    done: false
  });
}

function burst(x, y, col, n) {
  for (var i = 0; i < n; i++) {
    var a = (i / n) * Math.PI * 2 + Math.random() * 0.5;
    var s = 1.5 + Math.random() * 3.5;
    particles.push({
      x: x, y: y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.5,
      r: 2 + Math.random() * 3,
      alpha: 1, decay: 0.045, color: col
    });
  }
}

function drawBg() {
  ctx.fillStyle = '#0a1520';
  ctx.fillRect(0, 0, W, H);
  var off = (frame * spd * 0.4) % 40;
  ctx.strokeStyle = 'rgba(255,255,255,.03)';
  ctx.lineWidth = 1;
  for (var x = -off; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
}

function drawTrail() {
  if (trail.length < 2) return;
  for (var i = 1; i < trail.length; i++) {
    var t = i / trail.length;
    ctx.strokeStyle = 'rgba(56,189,248,' + (t * 0.18) + ')';
    ctx.lineWidth = t * 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x,   trail[i].y);
    ctx.stroke();
  }
}

function drawPlane(px, py, tilt) {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(tilt);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,.18)';
  ctx.beginPath();
  ctx.ellipse(2, 5, PW * 0.5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body
  ctx.fillStyle = '#e8f4fd';
  ctx.beginPath();
  ctx.moveTo(PW/2, 0);
  ctx.lineTo(-PW/2, -PH/2);
  ctx.lineTo(-PW/4, 0);
  ctx.lineTo(-PW/2,  PH/2);
  ctx.closePath();
  ctx.fill();
  // Fold line
  ctx.strokeStyle = 'rgba(56,189,248,.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PW/2, 0); ctx.lineTo(-PW/4, 0);
  ctx.stroke();
  // Wing highlight
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath();
  ctx.moveTo(PW/2, 0);
  ctx.lineTo(-PW/2, -PH/2);
  ctx.lineTo(-PW/4, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawObj(ob) {
  if (ob.done) return;
  var oy = ob.y + Math.sin(ob.bob) * 3;
  ctx.save();
  ctx.translate(ob.x, oy);
  ctx.rotate(ob.rot);
  var sz = ob.sz;
  if (ob.bad) {
    var col = ob.letter === 'F' ? '#FF5733' : '#F4C542';
    ctx.fillStyle = ob.letter === 'F' ? 'rgba(255,87,51,.13)' : 'rgba(244,197,66,.1)';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.rect(-sz * 0.5, -sz * 0.65, sz, sz * 1.3);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = col;
    ctx.font = '900 ' + Math.round(sz * 0.9) + 'px Fraunces,serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ob.letter, 0, 0);
    // Red X mark
    ctx.strokeStyle = 'rgba(255,87,51,.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sz*0.15, -sz*0.4); ctx.lineTo(sz*0.45, -sz*0.1);
    ctx.moveTo(sz*0.45, -sz*0.4); ctx.lineTo(sz*0.15, -sz*0.1);
    ctx.stroke();
  } else {
    ctx.shadowColor = '#F4C542';
    ctx.shadowBlur  = 10;
    ctx.fillStyle   = '#F4C542';
    ctx.font = '900 ' + sz + 'px Fraunces,serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('A', 0, 0);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(244,197,66,.5)';
    ctx.lineWidth = 1;
    var sp = sz * 0.7;
    var spokes = [[0,-sp],[sp,0],[0,sp],[-sp,0]];
    for (var k = 0; k < 4; k++) {
      ctx.beginPath();
      ctx.moveTo(spokes[k][0]*0.3, spokes[k][1]*0.3);
      ctx.lineTo(spokes[k][0], spokes[k][1]);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.font = '500 11px DM Mono,monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  var s = String(Math.floor(score));
  while (s.length < 5) s = '0' + s;
  ctx.fillText(s, W-10, 8);
  if (hiScore > 0) {
    ctx.fillStyle = 'rgba(244,197,66,.45)';
    var h = String(Math.floor(hiScore));
    while (h.length < 5) h = '0' + h;
    ctx.fillText('HI ' + h, W-10, 22);
  }
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

function drawIdleScreen() {
  drawBg();
  drawPlane(PX, H/2 + Math.sin(frame * 0.04) * 6, Math.sin(frame * 0.04) * 0.08);
  drawHUD();
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.font = '600 13px DM Sans,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PRESS SPACE OR TAP TO FLY', W/2, H/2 - 10);
  ctx.fillStyle = 'rgba(255,255,255,.2)';
  ctx.font = '400 10px DM Mono,monospace';
  ctx.fillText('dodge D and F  -  collect gold A', W/2, H/2 + 8);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(255,87,51,.14)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.font = '700 14px Fraunces,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('crashed into a bad grade', W/2, H/2 - 8);
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.font = '400 10px DM Mono,monospace';
  ctx.fillText('SCORE ' + Math.floor(score) + '   SPACE / TAP TO RETRY', W/2, H/2 + 9);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  drawHUD();
}

function tick() {
  frame++;
  score += spd * 0.08;
  spd = 2.8 + frame * 0.0012;

  // Physics
  var dir = getDir();
  plane.vy += dir * 0.55;
  plane.vy *= 0.82;
  if (plane.vy >  4.5) plane.vy =  4.5;
  if (plane.vy < -4.5) plane.vy = -4.5;
  plane.y += plane.vy;
  if (plane.y < PH)     plane.y = PH;
  if (plane.y > H - PH) plane.y = H - PH;
  plane.tilt = plane.vy * 0.06;

  // Trail
  trail.push({ x: PX - PW/2, y: plane.y });
  if (trail.length > 20) trail.shift();

  // Spawn
  nextSpawn--;
  if (nextSpawn <= 0) {
    spawn();
    nextSpawn = Math.max(28, 62 - frame * 0.016);
  }

  // Update objects
  for (var i = 0; i < objects.length; i++) {
    objects[i].x   -= spd;
    objects[i].bob += objects[i].bobSpd;
    objects[i].rot += objects[i].vrot;
  }
  // Remove offscreen + collected
  objects = objects.filter(function(o) { return o.x > -40 && !o.done; });

  // Collision
  for (var j = 0; j < objects.length; j++) {
    var ob = objects[j];
    var oy = ob.y + Math.sin(ob.bob) * 3;
    var dx = Math.abs(PX - ob.x);
    var dy = Math.abs(plane.y - oy);
    if (dx < PW * 0.42 && dy < ob.sz * 0.6) {
      if (ob.bad) {
        burst(PX, plane.y, '#FF5733', 14);
        state = DEAD;
        var newHi = Math.floor(score) > hiScore;
        if (newHi) {
          hiScore = Math.floor(score);
          try { localStorage.setItem('pilotHi', hiScore); } catch(e){}
          var badge = document.getElementById('hsBadge');
          if (badge) {
            badge.style.display = 'block';
            setTimeout(function() { badge.style.display = 'none'; }, 3000);
          }
        }
      } else {
        ob.done = true;
        score += 30;
        burst(ob.x, oy, '#F4C542', 10);
        try { navigator.vibrate(20); } catch(e){}
      }
      break;
    }
  }

  // Update particles
  for (var k = 0; k < particles.length; k++) {
    var p = particles[k];
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.alpha -= p.decay;
  }
  particles = particles.filter(function(p) { return p.alpha > 0.01; });

  // Draw
  drawBg();
  drawTrail();
  for (var m = 0; m < objects.length; m++) drawObj(objects[m]);
  drawParticles();
  drawPlane(PX, plane.y, plane.tilt);
  drawHUD();
}

// Main RAF loop
function loop() {
  if (state === IDLE) {
    drawIdleScreen();
    frame++;
  } else if (state === PLAYING) {
    tick();
  } else {
    // DEAD — draw last frame + overlay
    drawBg();
    drawTrail();
    for (var m = 0; m < objects.length; m++) drawObj(objects[m]);
    drawParticles();
    drawPlane(PX, plane.y, plane.tilt);
    drawDeadScreen();
  }
  requestAnimationFrame(loop);
}

loop();

})();
</script>
</body>
</html>
