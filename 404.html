<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/png" href="/favicon.png">
<title>404 — Elaborate</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --cream:#F5F0E8; --navy:#0D1B2A; --coral:#FF5733; --gold:#F4C542;
  --sage:#7DBE8E; --lavender:#A78BFA; --sky:#38BDF8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--navy);
  color:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* ── BACKGROUND NOISE ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
  background-size:180px;pointer-events:none;z-index:0;
}

/* ── FLOATING NUMBERS ── */
.float-num{
  position:fixed;font-family:'Fraunces',serif;font-weight:900;
  color:rgba(255,255,255,.03);pointer-events:none;z-index:0;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  from{transform:translateY(110vh) rotate(-8deg)}
  to{transform:translateY(-20vh) rotate(8deg)}
}

/* ── MAIN CONTENT ── */
.page{position:relative;z-index:1;width:100%;max-width:860px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:0}

/* The big 404 */
.hero-num{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(5rem,18vw,11rem);
  line-height:.85;letter-spacing:-.05em;
  background:linear-gradient(135deg,var(--coral) 0%,var(--gold) 40%,var(--lavender) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:heroIn .7s cubic-bezier(.22,1,.36,1) both;
  position:relative;
}
.hero-num::after{
  content:'404';
  position:absolute;inset:0;
  font-family:'Fraunces',serif;font-weight:900;
  font-size:inherit;letter-spacing:inherit;line-height:inherit;
  -webkit-text-fill-color:transparent;
  -webkit-text-stroke:1.5px rgba(255,255,255,.06);
  transform:translate(3px,4px);
  z-index:-1;
}
@keyframes heroIn{
  from{opacity:0;transform:scale(.7) translateY(30px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.headline{
  font-family:'Fraunces',serif;font-size:clamp(1.3rem,3vw,2rem);
  font-weight:700;margin-top:12px;text-align:center;
  color:#fff;letter-spacing:-.02em;
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .15s both;
}
.headline em{color:var(--coral);font-style:italic;font-weight:300}

.sub{
  font-size:.9rem;color:rgba(255,255,255,.45);margin-top:8px;
  text-align:center;max-width:420px;line-height:1.7;
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .22s both;
}

/* ── GAME CONTAINER ── */
.game-wrap{
  margin-top:20px;
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .3s both;
  position:relative;
}
.game-label{
  font-family:'DM Mono',monospace;font-size:.62rem;
  letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.25);text-align:center;
  margin-bottom:8px;
}
#gameCanvas{
  display:block;border-radius:16px;
  background:#0a1520;
  border:1.5px solid rgba(255,255,255,.08);
  box-shadow:0 16px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
  cursor:pointer;
}
.game-hint{
  font-size:.72rem;color:rgba(255,255,255,.22);
  text-align:center;margin-top:8px;
  font-family:'DM Mono',monospace;letter-spacing:.06em;
}

/* ── BUTTONS ── */
.btn-row{
  display:flex;gap:10px;margin-top:18px;
  animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .4s both;
}
.btn{
  font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;
  padding:11px 24px;border-radius:50px;border:none;cursor:pointer;
  transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--coral);color:#fff}
.btn-primary:hover{background:#e8401e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,87,51,.4)}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.1)}
.btn-ghost:hover{background:rgba(255,255,255,.13);color:#fff;transform:translateY(-2px)}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── HIGH SCORE ── */
.hs-badge{
  position:absolute;top:-10px;right:-10px;
  background:linear-gradient(135deg,var(--gold),#e8a800);
  color:var(--navy);font-family:'DM Mono',monospace;
  font-size:.6rem;font-weight:700;letter-spacing:.06em;
  padding:4px 10px;border-radius:50px;text-transform:uppercase;
  box-shadow:0 4px 12px rgba(244,197,66,.5);
  animation:badgePop .4s cubic-bezier(.34,1.56,.64,1) both;
  display:none;
}
@keyframes badgePop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<!-- Floating 404 numbers in background -->
<script>
for(let i=0;i<8;i++){
  const el=document.createElement('div');
  el.className='float-num';
  el.textContent='404';
  el.style.cssText=`left:${Math.random()*100}%;font-size:${6+Math.random()*12}rem;animation-duration:${14+Math.random()*18}s;animation-delay:-${Math.random()*20}s`;
  document.body.appendChild(el);
}
</script>

<div class="page">
  <div class="hero-num">404</div>

  <h1 class="headline">You wandered off the <em>syllabus</em></h1>
  <p class="sub">This page doesn't exist. Or it did exist, but a teacher confiscated it. Either way — it's gone.</p>

  <div class="game-wrap">
    <div class="game-label">While you're here — fly around</div>
    <canvas id="gameCanvas" width="620" height="160"></canvas>
    <div id="hsBadge" class="hs-badge">🏆 new best!</div>
    <div class="game-hint" id="gameHint">SPACE / TAP to start · ↑↓ or drag to steer</div>
  </div>

  <div class="btn-row">
    <a href="/" class="btn btn-primary">← Back to Home</a>
    <a href="/index.html#hub" class="btn btn-ghost">Open My Hub</a>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   PAPER PILOT — 404 game
   Steer a paper airplane through the hallway.
   Dodge bad grades (D, F) — collect gold A's.
   Tilt / drag / arrow keys to move up & down.
   Simple: one axis of movement, infinite scrolling.
═══════════════════════════════════════════════════════ */

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 32, 620);
  canvas.style.width  = maxW + 'px';
  canvas.style.height = Math.round(maxW * 160/620) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const W = 620, H = 160;
const C = {
  bg:   '#0a1520', grid: 'rgba(255,255,255,.03)',
  coral:'#FF5733', gold:'#F4C542', sage:'#7DBE8E',
  lav:  '#A78BFA', sky:'#38BDF8', white:'#ffffff',
};

const STATES = { IDLE:0, PLAYING:1, DEAD:2 };
let state = STATES.IDLE;
let score = 0, hiScore = +localStorage.getItem('pilotHi')||0;
let frame = 0, speed = 2.8;
let particles = [];
let objects   = [];    // grade letters + stars
let nextSpawn = 70;
let trailPts  = [];

// ── Plane ──
const plane = { x:80, y:H/2, vy:0, tilt:0 };
const PLANE_W = 28, PLANE_H = 14;

// ── Input ──
let upHeld = false, downHeld = false;
let touchY = null, dragY = null;

window.addEventListener('keydown', e => {
  if (e.code==='ArrowUp'   || e.code==='KeyW') { e.preventDefault(); upHeld=true; }
  if (e.code==='ArrowDown' || e.code==='KeyS') { e.preventDefault(); downHeld=true; }
  if ((e.code==='Space') && state!==STATES.PLAYING) { e.preventDefault(); startGame(); }
});
window.addEventListener('keyup', e => {
  if (e.code==='ArrowUp'   || e.code==='KeyW') upHeld=false;
  if (e.code==='ArrowDown' || e.code==='KeyS') downHeld=false;
});

// Touch — drag up/down to steer, tap to start
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchY = e.touches[0].clientY;
  dragY  = touchY;
  if (state !== STATES.PLAYING) startGame();
}, { passive:false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  dragY = e.touches[0].clientY;
}, { passive:false });
canvas.addEventListener('touchend', () => { touchY=null; dragY=null; }, { passive:true });
canvas.addEventListener('click', () => { if (state!==STATES.PLAYING) startGame(); });

// Mouse drag
let mouseDown = false, mouseY = null;
canvas.addEventListener('mousedown', e => { mouseDown=true; mouseY=e.clientY; });
window.addEventListener('mousemove', e => { if(mouseDown) mouseY=e.clientY; });
window.addEventListener('mouseup', () => { mouseDown=false; mouseY=null; });

function getInput() {
  // keyboard
  if (upHeld)   return -1;
  if (downHeld) return  1;
  // touch/mouse drag — positive dy = moved finger down = go up (plane steers toward finger)
  if (touchY !== null && dragY !== null) {
    const dy = dragY - touchY;
    if (Math.abs(dy) > 6) return dy > 0 ? 1 : -1;
  }
  if (mouseDown && mouseY !== null) {
    const canvasRect = canvas.getBoundingClientRect();
    const relY = (mouseY - canvasRect.top) / (canvasRect.height / H);
    return relY < plane.y ? -1 : 1;
  }
  return 0;
}

// ── Game state ──
function startGame() {
  state   = STATES.PLAYING;
  score   = 0; frame = 0; speed = 2.8;
  objects = []; particles = []; trailPts = [];
  plane.y = H/2; plane.vy = 0; plane.tilt = 0;
  nextSpawn = 60;
  document.getElementById('gameHint').textContent = '↑↓ keys · drag to steer';
}

// ── Spawn ──
function spawnObject() {
  const isBad = Math.random() < 0.62;
  const letter = isBad
    ? (Math.random() < 0.5 ? 'F' : 'D')
    : 'A';
  const y = 18 + Math.random() * (H - 36);
  objects.push({
    letter, x: W + 20, y,
    bad: isBad,
    size: isBad ? 18 : 15,
    rot: (Math.random()-.5)*.6,
    vrot: (Math.random()-.5)*.025,
    wobble: Math.random()*Math.PI*2,
    wobbleSpeed: .04 + Math.random()*.03,
    collected: false,
  });
}

// ── Particles ──
function burst(x, y, col, n=10) {
  for (let i=0; i<n; i++) {
    const a = (i/n)*Math.PI*2 + Math.random()*.5;
    const s = 1.5 + Math.random()*3.5;
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1.5,
      r:2+Math.random()*3, alpha:1, decay:.045, color:col });
  }
}

// ── Draw ──
function drawBG() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0,0,W,H);
  // Subtle scrolling grid lines
  const off = (frame * speed * .4) % 40;
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 1;
  for (let x = -off; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
}

function drawTrail() {
  if (trailPts.length < 2) return;
  for (let i=1; i<trailPts.length; i++) {
    const t = i / trailPts.length;
    ctx.strokeStyle = `rgba(56,189,248,${t*.18})`;
    ctx.lineWidth = t*2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(trailPts[i-1].x, trailPts[i-1].y);
    ctx.lineTo(trailPts[i].x, trailPts[i].y);
    ctx.stroke();
  }
}

function drawPlane(px, py, tilt) {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(tilt);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,.18)';
  ctx.beginPath();
  ctx.ellipse(2, 5, PLANE_W*.5, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Body — white paper plane
  ctx.fillStyle = '#e8f4fd';
  ctx.beginPath();
  ctx.moveTo(PLANE_W/2, 0);         // nose
  ctx.lineTo(-PLANE_W/2, -PLANE_H/2); // top wing
  ctx.lineTo(-PLANE_W/4, 0);
  ctx.lineTo(-PLANE_W/2, PLANE_H/2);  // bottom wing
  ctx.closePath();
  ctx.fill();

  // Fold line
  ctx.strokeStyle = 'rgba(56,189,248,.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PLANE_W/2, 0);
  ctx.lineTo(-PLANE_W/4, 0);
  ctx.stroke();

  // Wing highlight
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.beginPath();
  ctx.moveTo(PLANE_W/2, 0);
  ctx.lineTo(-PLANE_W/2, -PLANE_H/2);
  ctx.lineTo(-PLANE_W/4, 0);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawObject(ob) {
  if (ob.collected) return;
  ctx.save();
  ctx.translate(ob.x, ob.y + Math.sin(ob.wobble)*3);
  ctx.rotate(ob.rot);

  if (ob.bad) {
    // Bad grade — red/dark, crumpled look
    ctx.fillStyle = ob.letter==='F' ? 'rgba(255,87,51,.15)' : 'rgba(244,197,66,.1)';
    ctx.strokeStyle = ob.letter==='F' ? C.coral : '#c8960a';
    ctx.lineWidth = 1.5;
    const s = ob.size;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(-s*.5,-s*.65,s,s*1.3,3) : ctx.rect(-s*.5,-s*.65,s,s*1.3);
    ctx.fill(); ctx.stroke();
    // Letter
    ctx.fillStyle = ob.letter==='F' ? C.coral : '#e8a800';
    ctx.font = `900 ${ob.size*.9}px "Fraunces",serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ob.letter, 0, 0);
    // Red mark
    ctx.strokeStyle = 'rgba(255,87,51,.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(s*.15,-s*.4); ctx.lineTo(s*.45,-s*.1);
    ctx.moveTo(s*.45,-s*.4); ctx.lineTo(s*.15,-s*.1);
    ctx.stroke();
  } else {
    // Gold A — glowing star
    ctx.shadowColor = C.gold;
    ctx.shadowBlur = 10;
    ctx.fillStyle = C.gold;
    ctx.font = `900 ${ob.size}px "Fraunces",serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('A', 0, 0);
    ctx.shadowBlur = 0;
    // Sparkle
    ctx.strokeStyle = 'rgba(244,197,66,.5)';
    ctx.lineWidth = 1;
    const sp = ob.size*.7;
    [[0,-sp],[sp,0],[0,sp],[-sp,0]].forEach(([dx,dy]) => {
      ctx.beginPath();
      ctx.moveTo(dx*.3,dy*.3); ctx.lineTo(dx,dy); ctx.stroke();
    });
  }
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.font = '500 11px "DM Mono",monospace';
  ctx.textAlign = 'right';
  ctx.fillText(String(Math.floor(score)).padStart(5,'0'), W-10, 15);
  if (hiScore > 0) {
    ctx.fillStyle = 'rgba(244,197,66,.4)';
    ctx.fillText('HI '+String(Math.floor(hiScore)).padStart(5,'0'), W-10, 28);
  }
  ctx.textAlign = 'left';
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawIdle() {
  drawBG();
  drawPlane(80, H/2 + Math.sin(frame*.04)*6, Math.sin(frame*.04)*.08);
  drawHUD();
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.font = '600 13px "DM Sans",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('PRESS SPACE OR TAP TO FLY', W/2, H/2-10);
  ctx.font = '400 10px "DM Mono",monospace';
  ctx.fillStyle = 'rgba(255,255,255,.22)';
  ctx.fillText('dodge F's and D's  ·  collect gold A's', W/2, H/2+7);
  ctx.textAlign = 'left';
  frame++;
  requestAnimationFrame(drawIdle.bound || (drawIdle.bound = () => { if(state===STATES.IDLE) drawIdle(); }));
}

function drawDead() {
  ctx.fillStyle = 'rgba(255,87,51,.15)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.font = '700 15px "Fraunces",serif';
  ctx.textAlign = 'center';
  ctx.fillText('crashed into a bad grade', W/2, H/2-8);
  ctx.font = '500 10px "DM Mono",monospace';
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  ctx.fillText('SCORE '+Math.floor(score)+'  ·  SPACE / TAP TO RETRY', W/2, H/2+9);
  ctx.textAlign='left';
  drawHUD();
}

// ── Main loop ──
function tick() {
  if (state !== STATES.PLAYING) return;
  frame++;
  score += speed * .08;
  speed = 2.8 + frame * .0012;

  // Input → physics
  const dir = getInput();
  const ACCEL = .55, DAMPING = .82, MAX_VY = 4.5;
  plane.vy += dir * ACCEL;
  plane.vy *= DAMPING;
  plane.vy = Math.max(-MAX_VY, Math.min(MAX_VY, plane.vy));
  plane.y += plane.vy;
  plane.y = Math.max(PLANE_H, Math.min(H - PLANE_H, plane.y));
  plane.tilt = plane.vy * .06;

  // Trail
  trailPts.push({ x: plane.x - PLANE_W/2, y: plane.y });
  if (trailPts.length > 22) trailPts.shift();

  // Wobble update
  objects.forEach(ob => { ob.wobble += ob.wobbleSpeed; ob.rot += ob.vrot; });

  // Spawn
  nextSpawn--;
  if (nextSpawn <= 0) {
    spawnObject();
    nextSpawn = Math.max(28, 65 - frame*.018);
  }

  // Move objects
  objects.forEach(ob => ob.x -= speed);
  objects = objects.filter(ob => ob.x > -40 && !ob.collected);

  // Collision
  const px = plane.x, py = plane.y;
  for (const ob of objects) {
    const dx = Math.abs(px - ob.x), dy = Math.abs(py - (ob.y + Math.sin(ob.wobble)*3));
    const hit = dx < PLANE_W*.42 && dy < ob.size*.6;
    if (!hit) continue;
    if (ob.bad) {
      burst(px, py, C.coral, 14);
      state = STATES.DEAD;
      if (score > hiScore) {
        hiScore = Math.floor(score);
        localStorage.setItem('pilotHi', hiScore);
        document.getElementById('hsBadge').style.display='block';
        setTimeout(()=>document.getElementById('hsBadge').style.display='none',3000);
      }
    } else {
      ob.collected = true;
      score += 30;
      burst(ob.x, ob.y, C.gold, 10);
      if (navigator.vibrate) navigator.vibrate(20);
    }
    break;
  }

  // Particles
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.alpha-=p.decay; });
  particles = particles.filter(p => p.alpha>.01);

  // Draw
  drawBG();
  drawTrail();
  objects.forEach(drawObject);
  drawParticles();
  drawPlane(plane.x, plane.y, plane.tilt);
  drawHUD();

  if (state === STATES.DEAD) { drawDead(); return; }
  requestAnimationFrame(tick);
}

// ── Bootstrap ──
function loop() {
  if (state === STATES.IDLE) { drawIdle(); return; }
  if (state === STATES.PLAYING) { tick(); return; }
  // dead — wait for input
  drawBG(); drawParticles(); drawPlane(plane.x,plane.y,plane.tilt); drawDead();
  requestAnimationFrame(() => { if(state===STATES.DEAD) loop(); });
}

// Restart on space/tap when dead
window.addEventListener('keydown', e => {
  if (e.code==='Space' && state===STATES.DEAD) { e.preventDefault(); startGame(); tick(); }
});
canvas.addEventListener('click', () => { if(state===STATES.DEAD) { startGame(); tick(); } });

loop();
</script>
</body>
</html>
