<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Tickets — Elaborate</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--cream:#F5F0E8;--navy:#0D1B2A;--coral:#FF5733;--gold:#F4C542;--sage:#7DBE8E;--card-bg:#FFFFFF;--text:#1A1A2E;--muted:#6B7280;--radius:16px;--shadow:0 4px 24px rgba(13,27,42,.10);--tr:.2s cubic-bezier(.4,0,.2,1)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:68px;background:rgba(245,240,232,.92);backdrop-filter:blur(14px);border-bottom:1.5px solid rgba(13,27,42,.07)}
  .logo{font-family:'Fraunces',serif;font-weight:900;font-size:1.6rem;color:var(--navy);letter-spacing:-.02em;text-decoration:none;transition:color var(--tr)}.logo span{color:var(--coral)}.logo:hover{color:var(--coral)}
  .nav-btn{font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;padding:9px 20px;border-radius:50px;border:none;cursor:pointer;transition:all var(--tr);text-decoration:none;display:inline-flex;align-items:center}
  .nav-btn.ghost{background:transparent;color:var(--navy)}.nav-btn.ghost:hover{background:rgba(13,27,42,.06)}
  .nav-btn.primary{background:var(--navy);color:var(--cream)}.nav-btn.primary:hover{background:var(--coral);transform:translateY(-1px)}

  /* NOT LOGGED IN */
  .not-logged-in{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:100px 24px}
  .not-logged-in h2{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:var(--navy);margin-bottom:12px}
  .not-logged-in p{color:var(--muted);margin-bottom:28px;line-height:1.7}

  /* MAIN */
  .page-wrap{max-width:900px;margin:0 auto;padding:100px 40px 80px}
  .page-header{margin-bottom:36px}
  .page-header h1{font-family:'Fraunces',serif;font-size:2.2rem;font-weight:900;color:var(--navy);letter-spacing:-.02em;margin-bottom:6px}
  .page-header h1 em{font-style:italic;font-weight:300;color:var(--coral)}
  .page-header p{font-size:.9rem;color:var(--muted)}

  /* TICKET LIST */
  .ticket-list{display:flex;flex-direction:column;gap:14px}
  .ticket-item{background:var(--card-bg);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);border:1.5px solid rgba(13,27,42,.05);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;justify-content:space-between;gap:16px}
  .ticket-item:hover{box-shadow:0 8px 32px rgba(13,27,42,.14);transform:translateY(-2px)}
  .ticket-item.has-unread{border-left:4px solid var(--coral)}
  .ticket-left{flex:1;min-width:0}
  .ticket-subject-line{font-weight:700;color:var(--navy);font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ticket-meta{font-size:.78rem;color:var(--muted);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .ticket-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
  .status-pill{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:50px}
  .status-pill.open{background:rgba(255,87,51,.1);color:var(--coral)}
  .status-pill.in-progress{background:rgba(244,197,66,.15);color:#B8920A}
  .status-pill.resolved{background:rgba(125,190,142,.15);color:#2E7D47}
  .unread-dot{width:8px;height:8px;border-radius:50%;background:var(--coral);display:none}
  .ticket-item.has-unread .unread-dot{display:block}

  .empty-state{text-align:center;padding:72px 24px;color:var(--muted)}
  .empty-state .empty-icon{font-size:2.5rem;margin-bottom:16px;opacity:.5}
  .empty-state h3{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:900;color:var(--navy);margin-bottom:8px}
  .empty-state p{font-size:.9rem;line-height:1.7}

  .loading{text-align:center;padding:48px;color:var(--muted);font-size:.9rem}
  .mini-spinner{width:20px;height:20px;border:2px solid rgba(13,27,42,.1);border-top-color:var(--coral);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}

  /* CHAT MODAL */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(13,27,42,.55);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:opacity .25s}
  @media(min-width:600px){.modal-overlay{align-items:center;padding:24px}}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .chat-modal{background:var(--card-bg);width:100%;max-width:620px;height:90vh;max-height:700px;border-radius:24px 24px 0 0;display:flex;flex-direction:column;box-shadow:0 -8px 60px rgba(13,27,42,.2);transform:translateY(30px);transition:transform .3s cubic-bezier(.4,0,.2,1)}
  @media(min-width:600px){.chat-modal{border-radius:24px;transform:translateY(20px) scale(.97)}}
  .modal-overlay.open .chat-modal{transform:translateY(0) scale(1)}

  /* Chat header */
  .chat-header{padding:20px 24px;border-bottom:1.5px solid rgba(13,27,42,.07);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
  .chat-header-info h3{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:900;color:var(--navy);margin-bottom:3px}
  .chat-header-info .chat-meta{font-size:.75rem;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .modal-close{width:32px;height:32px;border-radius:50%;border:none;background:rgba(13,27,42,.07);cursor:pointer;font-size:.9rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all var(--tr);flex-shrink:0}
  .modal-close:hover{background:rgba(255,87,51,.12);color:var(--coral)}

  /* Chat messages */
  .chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
  .chat-messages::-webkit-scrollbar{width:4px}.chat-messages::-webkit-scrollbar-track{background:transparent}.chat-messages::-webkit-scrollbar-thumb{background:rgba(13,27,42,.12);border-radius:4px}

  /* Original ticket body */
  .original-message{background:rgba(13,27,42,.04);border:1.5px solid rgba(13,27,42,.07);border-radius:14px;padding:16px 18px}
  .original-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .original-body{font-size:.9rem;color:var(--text);line-height:1.7}

  /* Message bubbles */
  .msg{display:flex;flex-direction:column;max-width:80%}
  .msg.user{align-self:flex-end;align-items:flex-end}
  .msg.admin{align-self:flex-start;align-items:flex-start}
  .msg-bubble{padding:12px 16px;border-radius:18px;font-size:.9rem;line-height:1.6}
  .msg.user .msg-bubble{background:var(--navy);color:#fff;border-bottom-right-radius:4px}
  .msg.admin .msg-bubble{background:rgba(255,87,51,.1);color:var(--text);border-bottom-left-radius:4px;border:1.5px solid rgba(255,87,51,.15)}
  .msg-sender{font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.04em}
  .msg-time{font-size:.67rem;color:var(--muted);margin-top:4px}

  /* Chat input */
  .chat-input-wrap{padding:16px 24px;border-top:1.5px solid rgba(13,27,42,.07);display:flex;gap:10px;flex-shrink:0;align-items:flex-end}
  .chat-input{flex:1;padding:12px 16px;border-radius:14px;border:1.5px solid rgba(13,27,42,.12);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:var(--cream);outline:none;resize:none;line-height:1.5;max-height:120px;transition:border-color var(--tr)}
  .chat-input:focus{border-color:var(--coral)}
  .send-btn{width:40px;height:40px;border-radius:12px;border:none;background:var(--navy);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all var(--tr);flex-shrink:0}
  .send-btn:hover{background:var(--coral);transform:scale(1.05)}
  .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .resolved-notice{text-align:center;font-size:.82rem;color:var(--muted);padding:10px;font-weight:500}

  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){nav{padding:0 16px}.page-wrap{padding:90px 16px 60px}}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Elaborate<span>.</span></a>
  <div style="display:flex;gap:8px">
    <a class="nav-btn ghost" href="support.html">New Ticket</a>
    <a class="nav-btn primary" href="index.html">My Hub →</a>
  </div>
</nav>

<!-- NOT LOGGED IN -->
<div class="not-logged-in" id="notLoggedIn" style="display:none">
  <div>
    <div style="font-size:2.5rem;margin-bottom:16px">🔒</div>
    <h2>Sign in to view your tickets</h2>
    <p>You need an Elaborate account to view your support tickets.</p>
    <a class="nav-btn primary" href="index.html" style="margin:0 auto">Go to Elaborate →</a>
  </div>
</div>

<!-- MAIN -->
<div class="page-wrap" id="mainWrap" style="display:none">
  <div class="page-header">
    <h1>My <em>Tickets</em></h1>
    <p id="ticketCountLabel">Loading your tickets…</p>
  </div>
  <div class="ticket-list" id="ticketList">
    <div class="loading"><span class="mini-spinner"></span>Loading…</div>
  </div>
</div>

<!-- CHAT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="chat-modal">
    <div class="chat-header">
      <div class="chat-header-info">
        <h3 id="chatSubject"></h3>
        <div class="chat-meta">
          <span id="chatTicketId"></span>
          <span id="chatStatus"></span>
        </div>
      </div>
      <button class="modal-close" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div id="chatInputArea">
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="Type a message…" rows="1" onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
const firebaseConfig = {
  apiKey:"AIzaSyA4f0NpoH1LLmbejrNmOgIxbD__MIUZkGs",authDomain:"elaborate-edc16.firebaseapp.com",
  projectId:"elaborate-edc16",storageBucket:"elaborate-edc16.firebasestorage.app",
  messagingSenderId:"923385978777",appId:"1:923385978777:web:7d0fdb0472e14e8500bd08"
};
import { initializeApp }                              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged }                from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, query, where,
         orderBy, onSnapshot, addDoc,
         serverTimestamp, doc }                       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser    = null;
let currentTicket  = null;
let unsubMessages  = null;

onAuthStateChanged(auth, user => {
  if (!user) {
    document.getElementById('notLoggedIn').style.display = 'flex';
    document.getElementById('mainWrap').style.display    = 'none';
    return;
  }
  currentUser = user;
  document.getElementById('notLoggedIn').style.display = 'none';
  document.getElementById('mainWrap').style.display    = 'block';
  loadTickets(user.uid);
});

function loadTickets(uid) {
  const q = query(
    collection(db, 'tickets'),
    where('uid', '==', uid),
    orderBy('createdAt', 'desc')
  );
  onSnapshot(q, snap => {
    const tickets = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
    renderTickets(tickets);
  });
}

function renderTickets(tickets) {
  const label = document.getElementById('ticketCountLabel');
  const list  = document.getElementById('ticketList');
  if (tickets.length === 0) {
    label.textContent = 'You have no tickets yet.';
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>No tickets yet</h3><p>When you submit a support ticket it will appear here. You can chat with us directly from each ticket.</p><br/><a href="support.html" style="font-family:'DM Sans',sans-serif;font-weight:600;color:var(--coral);text-decoration:none">Submit a ticket →</a></div>`;
    return;
  }
  label.textContent = `${tickets.length} ticket${tickets.length === 1 ? '' : 's'}`;
  const catLabels = {bug:'🐛 Bug',account:'🔐 Account',feature:'💡 Feature',appeal:'📋 Appeal',privacy:'🔒 Privacy',other:'💬 Other'};
  list.innerHTML = tickets.map(t => {
    const status = t.status || 'open';
    const statusLabel = status === 'in-progress' ? 'In Progress' : status.charAt(0).toUpperCase()+status.slice(1);
    const date = t.createdAt?.toDate ? t.createdAt.toDate().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    return `<div class="ticket-item" onclick="openTicket(${JSON.stringify(JSON.stringify(t))})">
      <div class="ticket-left">
        <div class="ticket-subject-line">${esc(t.subject||'(no subject)')}</div>
        <div class="ticket-meta">
          <span>${t.ticketId||''}</span>
          <span>${catLabels[t.category]||t.category||''}</span>
          <span>${date}</span>
        </div>
      </div>
      <div class="ticket-right">
        <span class="status-pill ${status}">${statusLabel}</span>
        <span class="unread-dot"></span>
      </div>
    </div>`;
  }).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.openTicket = function(jsonStr) {
  currentTicket = JSON.parse(jsonStr);
  const status = currentTicket.status || 'open';
  const statusLabel = status === 'in-progress' ? 'In Progress' : status.charAt(0).toUpperCase()+status.slice(1);
  document.getElementById('chatSubject').textContent  = currentTicket.subject || '(no subject)';
  document.getElementById('chatTicketId').textContent = currentTicket.ticketId || '';
  document.getElementById('chatStatus').innerHTML     = `<span class="status-pill ${status}" style="font-size:.68rem">${statusLabel}</span>`;

  // Resolved ticket — disable input
  const inputArea = document.getElementById('chatInputArea');
  if (status === 'resolved') {
    inputArea.innerHTML = '<div class="resolved-notice">✓ This ticket has been resolved. <a href="support.html" style="color:var(--coral);font-weight:600;text-decoration:none">Open a new ticket</a> if you need further help.</div>';
  } else {
    inputArea.innerHTML = `<div class="chat-input-wrap">
      <textarea class="chat-input" id="chatInput" placeholder="Type a message…" rows="1" onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>`;
  }

  document.getElementById('modalOverlay').classList.add('open');

  // Unsubscribe previous listener
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }

  // Load messages in real time
  const msgsRef = collection(db, 'tickets', currentTicket._docId, 'messages');
  const msgsQ   = query(msgsRef, orderBy('createdAt', 'asc'));
  unsubMessages = onSnapshot(msgsQ, snap => {
    renderMessages(snap.docs.map(d => d.data()));
  });
};

function renderMessages(messages) {
  const container = document.getElementById('chatMessages');
  const t = currentTicket;
  let html = `<div class="original-message">
    <div class="original-label">Original message</div>
    <div class="original-body">${esc(t.body||'')}</div>
  </div>`;
  messages.forEach(m => {
    const isUser  = m.role === 'user';
    const time    = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    const sender  = isUser ? (t.firstName||'You') : 'Elaborate Support';
    html += `<div class="msg ${isUser ? 'user' : 'admin'}">
      <div class="msg-sender">${esc(sender)}</div>
      <div class="msg-bubble">${esc(m.text||'')}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

window.sendMessage = async function() {
  const input = document.getElementById('chatInput');
  const btn   = document.getElementById('sendBtn');
  if (!input || !currentTicket || !currentUser) return;
  const text = input.value.trim();
  if (!text) return;
  btn.disabled   = true;
  input.disabled = true;
  try {
    await addDoc(collection(db, 'tickets', currentTicket._docId, 'messages'), {
      text,
      role:       'user',
      senderName: `${currentTicket.firstName||''} ${currentTicket.lastName||''}`.trim(),
      uid:        currentUser.uid,
      createdAt:  serverTimestamp()
    });
    input.value        = '';
    input.style.height = '';
  } catch(e) {
    console.error('Send failed:', e);
    // Show inline error
    const err = document.createElement('div');
    err.textContent = 'Failed to send. Please try again.';
    err.style.cssText = 'color:#FF5733;font-size:.8rem;padding:6px 0;text-align:center';
    input.parentElement.after(err);
    setTimeout(() => err.remove(), 4000);
  }
  btn.disabled   = false;
  input.disabled = false;
  input.focus();
};

window.closeChat = function() {
  document.getElementById('modalOverlay').classList.remove('open');
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  currentTicket = null;
};
window.handleOverlayClick = function(e) { if (e.target===document.getElementById('modalOverlay')) closeChat(); };
window.handleChatKey = function(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
window.autoResize = function(el) { el.style.height=''; el.style.height=Math.min(el.scrollHeight,120)+'px'; };
</script>
</body>
</html>
